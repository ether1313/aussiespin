name: Update sitemap on push

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  generate-seo-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate sitemap and robots
        run: npm run seo:generate

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain public/sitemap.xml public/robots.txt)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/sitemap.xml public/robots.txt
            git commit -m "chore(seo): auto-update sitemap and robots [skip ci]"
            git push
          else
            echo "No sitemap or robots changes detected."
          fi
